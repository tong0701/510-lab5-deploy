[pytest]
pythonpath = .
filterwarnings =
    ignore:.*enablePackrat.*:DeprecationWarning
    ignore:.*escChar.*:DeprecationWarning
    ignore:.*unquoteResults.*:DeprecationWarning
    ignore:.*model_validator.*:DeprecationWarning:pydantic
    ignore::pydantic.warnings.PydanticDeprecatedSince212
    ignore:The 'timeout' parameter is deprecated:DeprecationWarning
    ignore:The 'verify' parameter is deprecated:DeprecationWarning
    ignore:Python versions below 3.10 are deprecated:DeprecationWarning
